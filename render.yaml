services:
  - type: web
    name: qpc-champion
    env: node
    region: frankfurt
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ADMIN_PASSWORD
        sync: false        # à définir manuellement dans le dashboard Render
      - key: TOKEN_SECRET
        generateValue: true
      # Persistance permanente : auto-sync data/*.json vers la branche `data`
      # du repo. À définir manuellement (token GitHub avec scope `repo`).
      - key: GH_TOKEN
        sync: false
      - key: GH_REPO
        value: Ricard228/qpc-app
      - key: GH_BRANCH
        value: data
