  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1F3864" />
  <meta name="application-name" content="QPC" />

  <!-- Icônes pour mobile -->

  <meta name="apple-mobile-web-app-capable" content="yes" />

  <meta name="apple-mobile-web-app-title" content="QPC" />

  <!-- Empêche le zoom intempestif sur les inputs iOS -->

    <div class="brand" id="brand-home">
      <span class="brand-mark">QPC</span>
      <span class="brand-text">Économie &amp; Sciences sociales</span>

      <div class="who" id="who"></div>
    </div>

  <!-- ZONE PRINCIPALE — VIEWS -->

  <!-- PIED -->
  <footer class="bottombar">
    <span id="footer-meta">Chargement…</span>
    <span class="dot">·</span>
    <span>Conçu par Kossi Nevame AGBENU · NEVAME Data House &amp; ESA Université de Lomé</span>

  <!-- TEMPLATES -->

  <template id="tpl-login">
    <section class="screen screen-login">
      <div class="login-illustration" aria-hidden="true">
        <img src="icons/economy-book.svg" alt="" />
      </div>

      <div class="login-card">
        <div class="login-brand">
          <span class="brand-mark">QPC</span>
          <span>Questions pour un Champion</span>
        </div>
        <h1 class="title-xl" style="margin-top:14px;">Connexion</h1>
        <p class="lead">Entrez votre <strong>code d'accès</strong> personnel pour jouer. Le super-administrateur peut générer un code pour vous.</p>

        <form id="form-user-login" class="form-row" style="margin-top:14px;">
          <input type="text" id="login-code" placeholder="Code d'accès (ex. QPC-A3B7XK91)"
            autocomplete="off" autocapitalize="characters" required style="text-transform:uppercase;letter-spacing:1px;font-weight:600;" />
          <button class="btn btn-primary" type="submit">Entrer</button>
        </form>
        <div id="login-error" class="login-error" hidden></div>

        <div class="login-admin-link">
          <a href="#" id="show-admin-login">Accès super-administrateur →</a>
        </div>

        <form id="form-admin-login" class="form-row" style="margin-top:10px;" hidden>
          <input type="password" id="admin-password" placeholder="Mot de passe super-admin" required />
          <button class="btn" type="submit">Entrer admin</button>
        </form>
      </div>

      <!-- Bloc d'installation de l'application -->
      <div class="install-card" id="install-card">
        <div class="install-icon">📲</div>
        <div class="install-content">
          <h3>Installer l'application sur votre appareil</h3>
          <p class="muted" id="install-hint">Jouez à QPC comme une vraie app, sans navigateur, même partiellement hors-ligne.</p>
          <div class="install-actions">
            <button id="btn-install-pwa" class="btn btn-primary">📲 Installer l'application QPC</button>
          </div>
          <div id="install-ios-help" class="ios-help" hidden>
            <strong>iOS (Safari)</strong> : touchez le bouton Partager <span class="icon-share">⎙</span> en bas, puis « Sur l'écran d'accueil ». L'icône QPC apparaît sur votre écran principal.
          </div>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-profiles">
    <section class="screen">
      <h1 class="title-xl">Bienvenue</h1>
      <p class="lead">Choisissez un profil pour suivre vos parties, ou créez-en un nouveau.</p>

      <div class="card" id="profiles-list-card">
        <h2 class="card-title">Profils existants</h2>
        <div id="profiles-list" class="profiles-list"></div>
      </div>

      <div class="card">
        <h2 class="card-title">Créer un nouveau profil</h2>
        <form id="form-create-profile" class="form-row">
          <input type="text" id="new-profile-name" placeholder="Votre nom (ex. Rich)" maxlength="60" required />
          <button type="submit" class="btn btn-primary">Créer</button>
        </form>
      </div>
    </section>
  </template>

  <template id="tpl-home">
    <section class="screen">
      <h1 class="title-xl">Que voulez-vous faire ?</h1>

      <div id="resume-banner" class="banner banner-warn" hidden>
        <div>
          <strong>Partie en cours</strong> sauvegardée le <span id="resume-when"></span>.
          Manche <span id="resume-where"></span>.
        </div>
        <div class="banner-actions">
          <button id="btn-resume" class="btn btn-primary">Reprendre</button>
          <button id="btn-discard" class="btn btn-ghost">Abandonner</button>
        </div>
      </div>

      <div class="grid">
        <div class="card card-action" id="card-new-game">
          <div class="card-icon">▶</div>
          <h2 class="card-title">Nouvelle partie</h2>
          <p>Choisissez les manches et les domaines, puis jouez.</p>
        </div>
        <div class="card card-action" id="card-duels">
          <div class="card-icon">⚔️</div>
          <h2 class="card-title">Mes duels <span class="badge-pill" id="duels-badge" hidden>0</span></h2>
          <p>Défier un autre joueur ou voir vos confrontations en cours.</p>
        </div>
        <div class="card card-action" id="card-review">
          <div class="card-icon">📖</div>
          <h2 class="card-title">Révision libre</h2>
          <p>Parcourir les <span id="card-review-count">…</span> questions par domaine, sans timer ni score.</p>
        </div>
        <div class="card card-action" id="card-history">
          <div class="card-icon">📊</div>
          <h2 class="card-title">Mes parties</h2>
          <p>Historique et statistiques.</p>
        </div>
        <div class="card card-action" id="card-switch">
          <div class="card-icon">👤</div>
          <h2 class="card-title">Changer de profil</h2>
          <p>Reprendre avec un autre joueur.</p>
        </div>
      </div>

      <div class="card" style="margin-top:8px;">
        <h2 class="card-title">Sauvegarde des profils</h2>
        <p class="muted" style="margin-top:0;">Les profils sont enregistrés dans votre navigateur. Exportez-les pour les transférer sur un autre appareil ou en garder une copie.</p>
        <div class="form-row">
          <button id="btn-export-all" class="btn">Exporter tous les profils (.json)</button>
          <label class="btn" for="file-import-all" style="cursor:pointer;">Importer un fichier .json</label>
          <input id="file-import-all" type="file" accept="application/json,.json" hidden />
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-review">
    <section class="screen">
      <h1 class="title-xl">Révision libre</h1>
      <p class="lead">Parcourez la base des <span id="rev-total-count">…</span> questions, sans timer ni score.</p>

      <div class="card">
        <h2 class="card-title">Filtres</h2>
        <div class="checks-row" id="rev-manches">
          <label class="check"><input type="checkbox" value="manche1" checked /> <span>Manche 1</span></label>
          <label class="check"><input type="checkbox" value="manche2" checked /> <span>Manche 2</span></label>
          <label class="check"><input type="checkbox" value="manche3" checked /> <span>Manche 3</span></label>
        </div>
        <div class="checks-grid" id="rev-domains" style="margin-top:10px;"></div>
        <div class="form-row" style="margin-top:12px;">
          <button id="btn-rev-all" class="btn btn-ghost">Tout cocher</button>
          <button id="btn-rev-none" class="btn btn-ghost">Tout décocher</button>
          <button id="btn-rev-shuffle" class="btn">🔀 Mélanger</button>
          <button id="btn-rev-apply" class="btn btn-primary">Appliquer les filtres</button>
        </div>
      </div>

      <div class="card">
        <div class="rev-top">
          <div id="rev-counter" class="muted">—</div>
          <div id="rev-pack-info" class="muted"></div>
        </div>
        <div class="play-question" id="rev-question">Chargement…</div>
        <div id="rev-reveal" hidden></div>
        <div class="play-actions" style="margin-top:18px;">
          <button id="btn-rev-prev" class="btn btn-ghost left">← Précédent</button>
          <button id="btn-rev-toggle" class="btn btn-primary">Afficher la réponse</button>
          <button id="btn-rev-next" class="btn">Suivant →</button>
        </div>
      </div>

      <div class="actions-row">
        <button id="btn-rev-home" class="btn btn-ghost">Retour à l'accueil</button>
      </div>
    </section>
  </template>

  <template id="tpl-setup">
    <section class="screen">
      <h1 class="title-xl">Configurer la partie</h1>

      <div class="card">
        <h2 class="card-title">Manches à jouer</h2>
        <div class="checks-row" id="manches-row">
          <label class="check"><input type="checkbox" value="manche1" checked /> <span>Manche 1 — Les 4 à la suite</span></label>
          <label class="check"><input type="checkbox" value="manche2" checked /> <span>Manche 2 — Face-à-face</span></label>
          <label class="check"><input type="checkbox" value="manche3" checked /> <span>Manche 3 — Finale 9 points</span></label>
        </div>
      </div>

      <div class="card">
        <h2 class="card-title">Domaines (filtrage des thèmes)</h2>
        <p class="muted">Si aucun domaine n'est coché, tous les thèmes sont autorisés.</p>
        <div class="checks-grid" id="domains-grid"></div>
        <div class="form-row" style="margin-top:12px;">
          <button id="btn-domains-all" class="btn btn-ghost">Tout cocher</button>
          <button id="btn-domains-none" class="btn btn-ghost">Tout décocher</button>
        </div>
      </div>

      <div class="card">
        <h2 class="card-title">Volume de la partie</h2>
        <label class="field">
          <span>Nombre de séries en Manche 1</span>
          <input type="number" id="n-m1" min="1" max="20" value="3" />
        </label>
        <label class="field">
          <span>Nombre de duels en Manche 2</span>
          <input type="number" id="n-m2" min="1" max="10" value="2" />
        </label>
        <label class="field">
          <span>Nombre de finales en Manche 3</span>
          <input type="number" id="n-m3" min="1" max="4" value="1" />
        </label>
      </div>

      <div class="card" id="setup-qcm-card">
        <h2 class="card-title">Mode de réponse</h2>
        <p class="muted" style="margin-top:0;">En mode QCM, les questions qui en disposent affichent des propositions à cocher. Les autres questions restent en saisie libre.</p>
        <div class="checks-row" id="setup-qcm-row">
          <label class="check"><input type="radio" name="qcm-mode" value="text" checked /> <span>Saisie libre</span></label>
          <label class="check"><input type="radio" name="qcm-mode" value="qcm" /> <span>QCM (choix multiples)</span></label>
        </div>
      </div>

      <div class="actions-row">
        <button id="btn-back-home" class="btn btn-ghost">Retour</button>
        <button id="btn-start" class="btn btn-primary btn-lg">Démarrer la partie</button>
      </div>
    </section>
  </template>

  <template id="tpl-play">

        <div class="play-score">Score : <strong id="play-score">0</strong></div>
        <div class="play-timer" id="play-timer">--</div>

        <div id="play-pack-title" class="play-pack-title"></div>
        <div id="play-pack-sub" class="play-pack-sub"></div>

        <h2 class="card-title">Détail des questions</h2>
        <div id="res-list" class="result-list"></div>

  <template id="tpl-history">

        <div id="stats-block" class="stats-block"></div>

      <div class="card">

        <section id="h-intro" class="help-section">
          <h2>1. Présentation générale</h2>
          <h3>1.1 Qu'est-ce que QPC ?</h3>
          <p>QPC (Questions pour un Champion) est une application web pédagogique inspirée de l'émission télévisée du même nom diffusée sur TV5 Monde. Elle transforme un recueil de plus de 770 questions documentées en jeu interactif chronométré, accessible depuis n'importe quel navigateur (ordinateur, tablette, smartphone) ou installable comme application native sur Android et iOS via la technologie PWA.</p>
          <p>L'application a été conçue dans un contexte académique ouest-africain (UEMOA, Togo) mais couvre l'économie générale, les sciences sociales et de nombreux domaines spécialisés utiles à toute formation supérieure en économie, gestion ou data science.</p>

          <h3>1.2 Caractéristiques principales</h3>
          <ul>
            <li>770 questions documentées sur 17 domaines (économie agricole, monnaie/finance, BRVM/UEMOA, ML/DL, suivi-évaluation projets, fiscalité Togo, marchés publics Togo, etc.)</li>
            <li>3 manches chronométrées inspirées de l'émission TV5 : « Les 4 à la suite » (40 s), « Face-à-face » (25 s/question, 1 à 6 points), « La finale » (15 s/question, 9 points gagnants)</li>
            <li>Mode QCM ou saisie libre, paramétrable par l'administrateur ou choisi par le joueur</li>
            <li>Mode Révision libre pour parcourir toutes les questions sans timer ni score</li>
            <li>Duels utilisateur-à-utilisateur et confrontations multi-joueurs organisées par l'admin</li>
            <li>Scoreboard live en temps réel pendant les compétitions</li>
            <li>Authentification par codes d'accès permanents générés par le super-administrateur</li>
            <li>Dashboard centralisé : classement, parties récentes, statistiques globales</li>
            <li>Import de domaines personnalisés (.txt ou .json)</li>
            <li>Export Excel et JSON de toute la base</li>
            <li>Persistance permanente des données via branche GitHub</li>
            <li>Installable comme PWA sur Android et iOS (1 clic)</li>
            <li>Chaque réponse contient au moins une référence cliquable vers une source vérifiée (Wikipedia FR + sites officiels institutionnels)</li>
          </ul>

          <h3>1.3 Accès à l'application</h3>
          <p>URL publique permanente : <a href="https://qpc-champion-58rn.onrender.com" target="_blank" rel="noopener noreferrer">https://qpc-champion-58rn.onrender.com</a></p>
          <p>Code source ouvert : <a href="https://github.com/Ricard228/qpc-app" target="_blank" rel="noopener noreferrer">https://github.com/Ricard228/qpc-app</a></p>

          <h3>1.4 Architecture</h3>
          <table class="help-table">
            <thead><tr><th>Couche</th><th>Technologie</th></tr></thead>
            <tbody>
              <tr><td>Backend</td><td>Node.js + Express, stockage JSON (auth/games/matches/custom-packs)</td></tr>
              <tr><td>Frontend</td><td>SPA Vanilla JS, CSS responsive, Service Worker pour PWA</td></tr>
              <tr><td>Persistance</td><td>Auto-sync vers la branche « data » du repo GitHub</td></tr>
              <tr><td>Hébergement</td><td>Render.com (Web Service free tier)</td></tr>
              <tr><td>Authentification</td><td>Tokens HMAC signés, codes utilisateurs aléatoires QPC-XXXXXXXX</td></tr>
              <tr><td>Export</td><td>XLSX (3 feuilles : Codes, Parties, Détail des réponses) + JSON complet</td></tr>
              <tr><td>Mobile</td><td>PWA installable (manifest + service worker offline)</td></tr>
            </tbody>
          </table>
        </section>

        <section id="h-start" class="help-section">
          <h2>2. Premier démarrage</h2>
          <h3>2.1 Accès depuis un navigateur</h3>
          <ol>
            <li>Ouvrir l'URL <a href="https://qpc-champion-58rn.onrender.com" target="_blank" rel="noopener noreferrer">https://qpc-champion-58rn.onrender.com</a> dans Chrome, Firefox, Edge ou Safari.</li>
            <li>À la première visite après inactivité (15 minutes), Render réveille le serveur. Compter 30 secondes maximum avant le chargement complet.</li>

        <section id="h-user" class="help-section">

          <h3>3.1 Page de connexion</h3>

          <h3>3.2 Tableau de bord personnel</h3>
          <table class="help-table">
            <thead><tr><th>Carte</th><th>Action</th></tr></thead>
            <tbody>
              <tr><td>▶ Nouvelle partie</td><td>Configurer une partie en solo : choix des manches, des domaines, du mode de réponse, et du volume.</td></tr>

          </table>
          <div class="help-warn">Si l'administrateur a désactivé la Révision libre, ou si vous avez un duel actif en cours, cette carte sera temporairement masquée et remplacée par un bandeau jaune explicatif.</div>

          <h3>3.3 Lancer une nouvelle partie solo</h3>
          <ol>
            <li>Cliquer sur la carte « Nouvelle partie ».</li>
            <li>Cocher les manches souhaitées : Manche 1 (Les 4 à la suite), Manche 2 (Face-à-face), et/ou Manche 3 (La finale).</li>
            <li>Sélectionner les domaines à inclure dans la sélection aléatoire (tout coché par défaut). Le badge à droite indique le nombre de questions disponibles par domaine.</li>
            <li>Indiquer le volume : nombre de séries en Manche 1 (1 à 20), de duels en Manche 2 (1 à 10), de finales en Manche 3 (1 à 4).</li>
            <li>Choisir le mode de réponse : « Saisie libre » (tape la réponse) ou « QCM (choix multiples) ». Selon les paramètres administrateur, cette option peut être imposée.</li>
            <li>Cliquer <strong>Démarrer la partie</strong>. Le jeu se lance immédiatement.</li>
          </ol>

          <h3>3.4 Les trois manches en détail</h3>
          <h4>Manche 1 — Les 4 à la suite</h4>
          <p>Une série de 4 questions sur un même thème. Le compteur démarre à <strong>40 secondes pour l'ensemble de la série</strong> (et non par question). Chaque bonne réponse vaut 1 point. Vous pouvez répondre rapidement pour gagner du temps sur les suivantes. Si le temps est épuisé, les questions restantes sont automatiquement marquées comme passées.</p>

          <h4>Manche 2 — Face-à-face</h4>
          <p>Six questions de difficulté croissante valant respectivement <strong>1, 2, 3, 4, 5 et 6 points</strong>. À chaque tour, vous choisissez vous-même la valeur que vous souhaitez tenter (cellules colorées). Une fois la valeur sélectionnée, vous disposez de <strong>25 secondes</strong> pour répondre. En cas d'erreur ou de question passée, aucun point n'est attribué pour cette valeur.</p>
          <div class="help-tip">Stratégie : commencez par les valeurs basses (1-2 pts) que vous maîtrisez sûrement, gardez les valeurs hautes pour les domaines forts.</div>

          <h4>Manche 3 — La finale</h4>
          <p>Enchaînement rapide de questions sur un même thème, avec <strong>15 secondes par question</strong>. Chaque bonne réponse vaut 1 point. La manche s'arrête lorsque vous atteignez 9 points (victoire) ou lorsque toutes les questions du pack ont été posées.</p>

          <h3>3.5 Pause et reprise</h3>
          <p>À tout moment pendant une partie, vous pouvez cliquer sur « Mettre en pause » en bas à gauche de l'écran de jeu. Votre score, votre position dans le plan de partie et toutes vos réponses sont sauvegardés.</p>
          <p>À votre prochaine connexion, un bandeau orange en haut de l'accueil propose de « Reprendre » la partie ou de l'« Abandonner ».</p>
          <div class="help-warn">La pause/reprise n'est pas disponible pour les duels (qui se jouent d'une traite) ni pour les confrontations admin.</div>

          <h3>3.6 Mode QCM et comparaison souple des réponses</h3>
          <h4>Mode saisie libre</h4>
          <p>Vous tapez votre réponse. Le système compare en ignorant les accents, la casse, la ponctuation, les articles français (« le », « la », « les », « l' », « d' », « un », « du »...) et les variantes entre parenthèses.</p>
          <p>Exemple : pour la réponse attendue « La BCE (Banque centrale européenne) », les saisies suivantes sont toutes acceptées : <code>bce</code>, <code>Banque Centrale Européenne</code>, <code>banque centrale europeenne</code>, <code>BCE</code>.</p>
          <h4>Mode QCM</h4>
          <p>Quatre propositions s'affichent. La position des choix est <strong>randomisée à chaque rendu</strong> : la bonne réponse n'est jamais à la même position d'une partie à l'autre.</p>
          <ul>
            <li>Si la question accepte une seule bonne réponse, les choix sont affichés avec des <strong>boutons radio</strong> (sélection unique).</li>
            <li>Si la question accepte plusieurs bonnes réponses simultanées, les choix sont affichés avec des <strong>cases à cocher</strong>. Pour gagner les points, vous devez cocher TOUTES les bonnes réponses et SEULEMENT celles-là.</li>
          </ul>
          <div class="help-info">Les distracteurs sont toujours conçus pour être de longueur supérieure ou égale à la bonne réponse, afin d'éviter qu'on identifie la bonne réponse par la longueur du texte.</div>

          <h3>3.7 Écran de résultats</h3>
          <p>À la fin de chaque partie :</p>
          <ul>
            <li>Le score total en gros</li>
            <li>Le détail par manche</li>
            <li>Le nombre de questions répondues, bonnes et mauvaises</li>
            <li>La liste complète des questions avec : votre réponse, la réponse attendue, l'explication, et les liens cliquables vers les sources documentaires (Wikipedia FR, sites officiels)</li>
          </ul>
          <div class="help-tip">Profitez de l'écran de résultats pour cliquer sur les liens des références : vous accédez directement à l'article Wikipedia ou au site institutionnel correspondant pour approfondir.</div>

          <h3>3.8 Mes duels</h3>
          <h4>Créer un duel</h4>
          <ol>
            <li>Cliquer sur la carte « Mes duels ».</li>
            <li>Dans le formulaire « Défier un joueur », saisir le code d'accès de l'adversaire (format QPC-XXXXXXXX).</li>
            <li>Cocher les manches à inclure (par défaut Manche 1 et 2).</li>
            <li>Optionnellement, filtrer les domaines.</li>
            <li>Cocher « 🏆 Afficher le scoreboard en direct pendant le duel » si vous souhaitez voir le score de votre adversaire en temps réel.</li>
            <li>Cliquer <strong>« ⚔️ Lancer le duel »</strong>. L'adversaire reçoit une invitation visible dans son propre onglet « Mes duels ».</li>
          </ol>
          <h4>Accepter ou refuser une invitation</h4>
          <ul>
            <li>✓ Accepter — le duel passe au statut actif, vous pouvez le jouer.</li>
            <li>✗ Refuser — le duel est annulé.</li>
          </ul>
          <h4>Jouer le duel</h4>
          <p>Une fois accepté, le duel apparaît dans « Duels actifs » avec un bouton « ▶ Jouer maintenant ». <strong>Les questions sont identiques pour les deux joueurs</strong> (mêmes packs, même ordre) afin de garantir une comparaison équitable.</p>
          <div class="help-warn">Pendant qu'un duel est en cours, l'accès à la Révision libre est temporairement bloqué.</div>
          <h4>Scoreboard live</h4>
          <p>Si activé, un widget fixe en haut à droite (ou en bas sur mobile) affiche en permanence :</p>
          <ul>
            <li>Le rang de chaque participant (#1, #2, …)</li>
            <li>Son nom (ou son code à défaut)</li>
            <li>Sa progression (par exemple « 3/12 questions »)</li>
            <li>Son score actuel en points</li>
          </ul>
          <p>Mise à jour automatique toutes les 4 secondes. Votre propre ligne est surlignée en bleu. Les joueurs ayant terminé sont marqués ✓.</p>
          <h4>Résultats du duel</h4>
          <p>Quand tous les participants ont terminé, un écran comparatif s'affiche, indiquant le vainqueur (score le plus élevé) et le détail par participant.</p>

          <h3>6.3 Persistance et déploiement</h3>
          <p>L'application est hébergée sur Render.com (free tier). Les fichiers de données (<code>data/auth.json</code>, <code>data/games.json</code>, <code>data/matches.json</code>, <code>data/custom-packs.json</code>) sont automatiquement synchronisés vers la branche <code>data</code> du repo GitHub Ricard228/qpc-app à chaque écriture (debounced 4 secondes).</p>
          <p>Au démarrage, le serveur récupère ces fichiers depuis GitHub pour restaurer l'état exact, même après un redémarrage Render (puisque le free tier n'a pas de disque persistant).</p>
          <p>Cette architecture garantit : zéro perte de données, historique complet des modifications consultable sur GitHub, possibilité de restauration à tout point dans le temps.</p>
        </section>

        <section id="h-faq" class="help-section">
          <h2>7. FAQ et dépannage</h2>

          <details>
            <summary>La page met longtemps à se charger lors de la première visite.</summary>
            <p>Le serveur Render free tier s'endort après 15 minutes d'inactivité. Le premier visiteur déclenche le réveil qui prend 30 à 45 secondes. Les visites suivantes sont instantanées.</p>
          </details>

          <details>
            <summary>J'ai oublié mon code d'accès.</summary>
            <p>Contactez le super-administrateur. Il peut consulter la liste de tous les codes dans son panneau admin, le retrouver par nom, ou vous en générer un nouveau.</p>
          </details>

          <details>
            <summary>Je suis sur iPhone et le bouton « Installer l'application QPC » ne fait rien.</summary>
            <p>Sur iOS, l'installation PWA ne peut être déclenchée qu'au travers du menu Partager de Safari. Vous ne pouvez pas l'installer depuis Chrome ou autres navigateurs sur iOS. Reportez-vous à la section 2.2.</p>
          </details>

          <details>
            <summary>Ma partie a planté ou s'est interrompue.</summary>
            <p>Si vous étiez en partie solo, votre progression a été sauvegardée à chaque réponse. À votre prochaine connexion, un bandeau orange propose de reprendre. Pour un duel, la sauvegarde n'est pas activée — vous devrez recommencer.</p>
          </details>

          <details>
            <summary>Le scoreboard live n'affiche rien.</summary>
            <p>Plusieurs causes : (1) l'option n'a pas été activée pour ce duel ; (2) l'adversaire n'a pas encore commencé ; (3) problème de connexion réseau.</p>
          </details>

          <details>
            <summary>J'ai créé un duel mais l'adversaire ne voit pas l'invitation.</summary>
            <p>Demandez à l'adversaire de vérifier qu'il s'est bien connecté avec le bon code. L'invitation apparaît dans sa carte « Mes duels » > « Invitations reçues ». Il peut rafraîchir la page (F5).</p>
          </details>

          <details>
            <summary>Une question semble mal corrigée — ma réponse est marquée fausse.</summary>
            <p>Vérifiez l'orthographe précise. Le système accepte plusieurs variantes (sans accents, sans articles, etc.) mais reste lié au texte de référence. Si votre formulation est synonyme mais clairement différente du texte attendu, elle peut être refusée. Signalez le cas à votre administrateur.</p>
          </details>

          <details>
            <summary>L'admin a importé un domaine personnalisé mais je ne le vois pas.</summary>
            <p>Rafraîchissez la page (F5). Le menu des domaines est rechargé à chaque ouverture de la configuration de partie ou de la révision libre.</p>
          </details>

          <details>
            <summary>Comment exporter mes résultats personnels ?</summary>
            <p>Les statistiques personnelles sont visibles dans « Mes parties ». Pour un export Excel détaillé, demandez à l'administrateur.</p>
          </details>

          <details>
            <summary>Je veux changer de profil sur le même appareil.</summary>
            <p>Cliquez « Déconnexion » en haut à droite, puis saisissez l'autre code. Plusieurs personnes peuvent partager un même appareil sans interférer.</p>
          </details>

          <details>
            <summary>L'application fonctionne-t-elle hors connexion ?</summary>
            <p>Partiellement. Les fichiers statiques de l'app (HTML, CSS, JS, icônes) sont mis en cache par le service worker, donc l'app peut s'ouvrir hors-ligne. Mais le contenu (questions, codes, scores) nécessite une connexion au serveur Render.</p>
          </details>
        </section>

            <h4>Format .txt simple</h4>
            <p>Une ligne par directive. Les directives sont suivies de <code>:</code> puis de la valeur. Les choix QCM commencent par <code>*</code> (bonne réponse) ou <code>-</code> (distracteur). Les lignes vides et celles commençant par <code>#</code> sont ignorées.</p>
            <pre>DOMAINE: Économie togolaise (test)
DESCRIPTION: Quelques questions sur l'économie du Togo (optionnel)

PACK: Macroéconomie du Togo (1)
MANCHE: 1
THEME: PIB et secteurs

Q: Quelle est la capitale économique du Togo ?
R: Lomé
* Lomé
- Sokodé
- Kara
- Atakpamé
E: Lomé est à la fois la capitale politique et économique.
S: https://fr.wikipedia.org/wiki/Lom%C3%A9

Q: Quel pourcentage du PIB togolais représente le secteur agricole environ ?
R: Environ 30 %
* Environ 30 % du PIB
- Environ 5 % du PIB
- Environ 60 % du PIB
- Environ 85 % du PIB
E: L'agriculture pèse traditionnellement 25-30 % du PIB togolais.

PACK: Macroéconomie du Togo (2)
MANCHE: 2
...
</pre>
            <h4>Format .json (technique)</h4>
            <pre>{
  "domain": "Économie togolaise (test)",
  "description": "Quelques questions sur l'économie du Togo",
  "packs": [
    {
      "title": "Macroéconomie du Togo (1)",
      "manche": "manche1",
      "theme": "PIB et secteurs",
      "questions": [
        {
          "q": "Quelle est la capitale économique du Togo ?",
          "r": "Lomé",
          "choices": ["Lomé", "Sokodé", "Kara", "Atakpamé"],
          "correctIndices": [0],
          "e": "Lomé est à la fois capitale politique et économique.",
          "ref": "https://fr.wikipedia.org/wiki/Lom%C3%A9"
        }
      ]
    }
  ]
}
</pre>
            <h4>Règles</h4>
            <ul>
              <li><code>DOMAINE:</code> obligatoire (nom unique, max 80 caractères)</li>
              <li><code>MANCHE:</code> doit être <strong>1</strong>, <strong>2</strong> ou <strong>3</strong> (défaut : 1)</li>
              <li>Chaque <code>Q:</code> doit avoir un <code>R:</code> non vide</li>
              <li>QCM : au moins 2 choix (1 marqué <code>*</code>), sinon mode saisie libre</li>
              <li><code>E:</code> = explication facultative, <code>S:</code> = source/URL facultative</li>
              <li>Manche 2 : <code>PTS:</code> optionnel par question (1 à 6 points)</li>
              <li>Le nom de domaine ne doit pas exister dans la base intégrée</li>
              <li>Réimporter avec le même nom <strong>remplace</strong> l'ancien domaine</li>
            </ul>
          </div>
