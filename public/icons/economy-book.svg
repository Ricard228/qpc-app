<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" fill="none">
  <defs>
    <linearGradient id="pageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F7FB"/>
    </linearGradient>
    <linearGradient id="coverGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F3864"/>
      <stop offset="100%" stop-color="#142346"/>
    </linearGradient>
    <linearGradient id="fcfaGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F3864"/>
      <stop offset="100%" stop-color="#C00000"/>
    </linearGradient>
    <radialGradient id="grainGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ============ Arrière-plan : symboles éco flottants =========== -->
  <g opacity="0.10" font-family="Georgia, serif" font-weight="700">
    <text x="32"  y="42"  font-size="32" fill="#1F3864">€</text>
    <text x="660" y="60"  font-size="28" fill="#1F3864">$</text>
    <text x="30"  y="400" font-size="26" fill="#1F3864">£</text>
    <text x="670" y="395" font-size="28" fill="#1F3864">∑</text>
    <text x="350" y="32"  font-size="22" fill="#C00000">%</text>
  </g>

  <!-- ============ Chapeau de diplômé en haut ===================== -->
  <g transform="translate(310, 14)">
    <polygon points="0,18 35,6 70,18 35,30" fill="#1F3864"/>
    <rect x="26" y="24" width="18" height="12" fill="#1F3864"/>
    <line x1="55" y1="13" x2="62" y2="40" stroke="#C00000" stroke-width="2"/>
    <circle cx="63" cy="42" r="3" fill="#C00000"/>
  </g>

  <!-- ============ Livre ouvert (zone gauche) ===================== -->
  <g filter="url(#softShadow)" transform="translate(0, 14)">
    <!-- Couvertures -->
    <path d="M 30 110 L 30 290 L 162 282 L 162 105 Z" fill="url(#coverGrad)"/>
    <path d="M 300 110 L 300 290 L 168 282 L 168 105 Z" fill="url(#coverGrad)"/>
    <!-- Pages -->
    <path d="M 38 115 L 38 282 L 165 274 Q 168 195 165 105 Z" fill="url(#pageGrad)" stroke="#D1D5DB" stroke-width="0.8"/>
    <path d="M 292 115 L 292 282 L 165 274 Q 168 195 165 105 Z" fill="url(#pageGrad)" stroke="#D1D5DB" stroke-width="0.8"/>
    <!-- Reliure -->
    <path d="M 162 105 Q 165 195 162 282 L 168 282 Q 168 195 168 105 Z" fill="#142346"/>
  </g>

  <!-- Contenu page gauche du livre : titre + lignes -->
  <g font-family="Georgia, serif" transform="translate(0, 14)">
    <text x="56" y="140" font-size="11" font-weight="700" fill="#1F3864">L'ÉCONOMIE</text>
    <text x="56" y="153" font-size="8" fill="#6B7280">par les questions</text>
    <line x1="56" y1="158" x2="155" y2="156" stroke="#9CA3AF" stroke-width="0.7"/>
    <line x1="56" y1="174" x2="158" y2="172" stroke="#9CA3AF" stroke-width="0.9"/>
    <line x1="56" y1="186" x2="152" y2="184" stroke="#9CA3AF" stroke-width="0.9"/>
    <line x1="56" y1="198" x2="158" y2="196" stroke="#9CA3AF" stroke-width="0.9"/>
    <line x1="56" y1="210" x2="148" y2="208" stroke="#9CA3AF" stroke-width="0.9"/>
    <line x1="56" y1="222" x2="156" y2="220" stroke="#9CA3AF" stroke-width="0.9"/>
    <line x1="56" y1="234" x2="150" y2="232" stroke="#9CA3AF" stroke-width="0.9"/>
    <line x1="56" y1="246" x2="155" y2="244" stroke="#9CA3AF" stroke-width="0.9"/>
    <line x1="56" y1="258" x2="148" y2="256" stroke="#9CA3AF" stroke-width="0.9"/>
  </g>

  <!-- Contenu page droite du livre : graphique éco -->
  <g transform="translate(0, 14)">
    <rect x="180" y="140" width="105" height="80" fill="#FAFBFD" stroke="#E5E7EB" stroke-width="0.8"/>
    <!-- Grille -->
    <line x1="180" y1="160" x2="285" y2="160" stroke="#E5E7EB" stroke-width="0.4"/>
    <line x1="180" y1="180" x2="285" y2="180" stroke="#E5E7EB" stroke-width="0.4"/>
    <line x1="180" y1="200" x2="285" y2="200" stroke="#E5E7EB" stroke-width="0.4"/>
    <!-- Barres -->
    <rect x="188" y="195" width="9" height="22" fill="#1F3864" opacity="0.6"/>
    <rect x="202" y="185" width="9" height="32" fill="#1F3864" opacity="0.7"/>
    <rect x="216" y="173" width="9" height="44" fill="#1F3864" opacity="0.8"/>
    <rect x="230" y="160" width="9" height="57" fill="#1F3864"/>
    <rect x="244" y="170" width="9" height="47" fill="#1F3864" opacity="0.8"/>
    <rect x="258" y="150" width="9" height="67" fill="#C00000"/>
    <rect x="272" y="163" width="9" height="54" fill="#1F3864" opacity="0.85"/>
    <!-- Courbe -->
    <polyline points="193,200 207,185 221,172 235,162 249,170 263,150 277,165"
              stroke="#C00000" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <text x="180" y="234" font-family="Georgia, serif" font-size="8" fill="#6B7280">Croissance des connaissances</text>
    <text x="180" y="245" font-family="Georgia, serif" font-size="7" fill="#9CA3AF">Indice QPC, base 100</text>
  </g>

  <!-- ============ Épi de blé / Agribusiness (bas gauche) ========= -->
  <g transform="translate(50, 310)">
    <!-- Tige principale -->
    <path d="M 30 90 Q 32 60 35 30 Q 38 10 40 0" stroke="#5A8C3B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Feuille -->
    <path d="M 35 50 Q 15 45 5 60 Q 18 55 35 55 Z" fill="#5A8C3B"/>
    <path d="M 36 30 Q 56 28 65 42 Q 50 36 36 38 Z" fill="#6FA84B"/>
    <!-- Grains de blé (épi) -->
    <g fill="url(#grainGrad)">
      <ellipse cx="40" cy="2"  rx="3.5" ry="6" transform="rotate(8 40 2)"/>
      <ellipse cx="35" cy="6"  rx="3" ry="5.5" transform="rotate(-10 35 6)"/>
      <ellipse cx="44" cy="10" rx="3.5" ry="6" transform="rotate(12 44 10)"/>
      <ellipse cx="33" cy="14" rx="3" ry="5.5" transform="rotate(-12 33 14)"/>
      <ellipse cx="42" cy="18" rx="3.5" ry="6" transform="rotate(14 42 18)"/>
      <ellipse cx="32" cy="22" rx="3" ry="5.5" transform="rotate(-14 32 22)"/>
      <ellipse cx="41" cy="26" rx="3" ry="5.5" transform="rotate(15 41 26)"/>
    </g>
    <!-- Petites barbes -->
    <g stroke="#B8860B" stroke-width="0.8" fill="none">
      <line x1="40" y1="2"  x2="44" y2="-6"/>
      <line x1="35" y1="6"  x2="29" y2="0"/>
      <line x1="44" y1="10" x2="50" y2="2"/>
      <line x1="33" y1="14" x2="27" y2="8"/>
    </g>
    <!-- Label -->
    <text x="-5" y="115" font-family="Georgia, serif" font-size="10" font-weight="700" fill="#5A8C3B">Agribusiness</text>
  </g>

  <!-- ============ Bloc FCFA (bas centre-gauche) ================== -->
  <g transform="translate(135, 325)">
    <!-- Pièce de monnaie circulaire -->
    <circle cx="35" cy="40" r="36" fill="#FFD700" stroke="#B8860B" stroke-width="2"/>
    <circle cx="35" cy="40" r="32" fill="none" stroke="#B8860B" stroke-width="0.8" stroke-dasharray="2 2"/>
    <text x="35" y="44" font-family="Georgia, serif" font-size="16" font-weight="800"
          fill="#1F3864" text-anchor="middle">FCFA</text>
    <text x="35" y="56" font-family="Georgia, serif" font-size="6" font-weight="500"
          fill="#6B7280" text-anchor="middle">UEMOA</text>
  </g>

  <!-- ============ Nuage de mots : 16 domaines couverts =========== -->
  <g font-family="Segoe UI, Helvetica, sans-serif" transform="translate(310, 60)">
    <text x="0" y="100" font-size="11" font-weight="700" fill="#142346" letter-spacing="0.5"
          text-anchor="start">Les 16 domaines couverts</text>
    <line x1="0" y1="106" x2="180" y2="106" stroke="#1F3864" stroke-width="1"/>

    <!-- Économie agricole — le plus grand (160 questions) -->
    <text x="6" y="135" font-size="17" font-weight="800" fill="#1F3864">Économie agricole</text>
    <text x="38" y="151" font-size="10" font-weight="500" fill="#5A8C3B">&amp; agribusiness</text>

    <!-- Monnaie / finance / budget -->
    <text x="180" y="125" font-size="14" font-weight="700" fill="#C00000">Monnaie &amp; finance</text>

    <!-- Statistique économétrie -->
    <text x="180" y="148" font-size="14" font-weight="700" fill="#2E7D32">Statistiques</text>
    <text x="280" y="148" font-size="11" font-weight="500" fill="#2E7D32">&amp; économétrie</text>

    <!-- Microéconomie + Macroéconomie -->
    <text x="6" y="178" font-size="13" font-weight="700" fill="#B8860B">Microéconomie</text>
    <text x="116" y="178" font-size="13" font-weight="700" fill="#1F3864">Macroéconomie</text>

    <!-- Commerce, développement, Afrique -->
    <text x="240" y="178" font-size="12" font-weight="600" fill="#C00000">Commerce &amp; Afrique</text>

    <!-- BRVM UEMOA -->
    <text x="6" y="204" font-size="13" font-weight="700" fill="#142346">BRVM / UEMOA</text>

    <!-- Pensée économique -->
    <text x="125" y="204" font-size="11" font-weight="600" fill="#6B21A8">Pensée éco.</text>

    <!-- Machine learning -->
    <text x="218" y="204" font-size="12" font-weight="700" fill="#6B21A8">Machine learning</text>

    <!-- Suivi-évaluation -->
    <text x="6" y="228" font-size="11" font-weight="600" fill="#2E7D32">Suivi-évaluation projets</text>

    <!-- Comptabilité -->
    <text x="158" y="228" font-size="11" font-weight="600" fill="#B8860B">Comptabilité</text>

    <!-- Fiscalité Togo -->
    <text x="245" y="228" font-size="10" font-weight="600" fill="#C00000">Fiscalité Togo</text>

    <!-- Marchés publics Togo -->
    <text x="6" y="250" font-size="10" font-weight="600" fill="#142346">Marchés publics Togo</text>

    <!-- Histoire travail santé éducation -->
    <text x="140" y="250" font-size="10" font-weight="500" fill="#6B7280">Histoire &amp; éducation</text>

    <!-- Sciences sociales -->
    <text x="6" y="270" font-size="10" font-weight="500" fill="#6B21A8">Sciences sociales</text>

    <!-- Deep learning -->
    <text x="115" y="270" font-size="10" font-weight="500" fill="#6B21A8">Deep learning</text>

    <!-- Culture générale environnement -->
    <text x="207" y="270" font-size="9" font-weight="500" fill="#6B7280">Culture générale</text>

    <!-- Total questions -->
    <g transform="translate(0, 286)">
      <rect x="0" y="0" width="350" height="22" rx="11" fill="#1F3864"/>
      <text x="175" y="15" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">
        766 questions documentées · réponses sourcées
      </text>
    </g>
  </g>
</svg>
