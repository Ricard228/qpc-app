<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" fill="none">
  <defs>
    <linearGradient id="pageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F7FB"/>
    </linearGradient>
    <linearGradient id="coverGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F3864"/>
      <stop offset="100%" stop-color="#142346"/>
    </linearGradient>
    <radialGradient id="grainGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    <linearGradient id="cycleHouseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F0FE"/>
      <stop offset="100%" stop-color="#D9E2F3"/>
    </linearGradient>
    <linearGradient id="cycleFirmGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBEAEA"/>
      <stop offset="100%" stop-color="#F5C0C0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.20"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F3864"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C00000"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A8C3B"/>
    </marker>
  </defs>

  <!-- ============ Chapeau de diplômé en haut centre =============== -->
  <g transform="translate(360, 8)">
    <polygon points="0,18 35,6 70,18 35,30" fill="#1F3864"/>
    <rect x="26" y="24" width="18" height="12" fill="#1F3864"/>
    <line x1="55" y1="13" x2="62" y2="40" stroke="#C00000" stroke-width="2"/>
    <circle cx="63" cy="42" r="3" fill="#C00000"/>
  </g>

  <!-- ============ LIVRE OUVERT (haut gauche, 20-300) =============== -->
  <g filter="url(#softShadow)" transform="translate(20, 50)">
    <path d="M 20 70 L 20 200 L 130 195 L 130 65 Z" fill="url(#coverGrad)"/>
    <path d="M 240 70 L 240 200 L 130 195 L 130 65 Z" fill="url(#coverGrad)"/>
    <path d="M 26 73 L 26 192 L 128 188 Q 130 130 128 65 Z" fill="url(#pageGrad)" stroke="#D1D5DB" stroke-width="0.6"/>
    <path d="M 234 73 L 234 192 L 132 188 Q 130 130 132 65 Z" fill="url(#pageGrad)" stroke="#D1D5DB" stroke-width="0.6"/>
    <path d="M 128 65 Q 130 130 128 192 L 132 192 Q 130 130 132 65 Z" fill="#142346"/>
  </g>
  <!-- Contenu du livre : titre + lignes + mini-graphique -->
  <g transform="translate(20, 50)" font-family="Georgia, serif">
    <text x="40" y="92" font-size="10" font-weight="700" fill="#1F3864">L'ÉCONOMIE</text>
    <text x="40" y="103" font-size="7" fill="#6B7280">par les questions</text>
    <line x1="40" y1="107" x2="120" y2="106" stroke="#9CA3AF" stroke-width="0.6"/>
    <line x1="40" y1="120" x2="123" y2="118" stroke="#9CA3AF" stroke-width="0.7"/>
    <line x1="40" y1="131" x2="118" y2="129" stroke="#9CA3AF" stroke-width="0.7"/>
    <line x1="40" y1="142" x2="123" y2="140" stroke="#9CA3AF" stroke-width="0.7"/>
    <line x1="40" y1="153" x2="115" y2="151" stroke="#9CA3AF" stroke-width="0.7"/>
    <line x1="40" y1="164" x2="120" y2="162" stroke="#9CA3AF" stroke-width="0.7"/>
    <line x1="40" y1="175" x2="118" y2="173" stroke="#9CA3AF" stroke-width="0.7"/>

    <!-- Mini-graphique page droite -->
    <rect x="148" y="95" width="80" height="60" fill="#FAFBFD" stroke="#E5E7EB" stroke-width="0.6"/>
    <rect x="153" y="138" width="7" height="14" fill="#1F3864" opacity="0.6"/>
    <rect x="163" y="130" width="7" height="22" fill="#1F3864" opacity="0.75"/>
    <rect x="173" y="118" width="7" height="34" fill="#1F3864" opacity="0.85"/>
    <rect x="183" y="108" width="7" height="44" fill="#1F3864"/>
    <rect x="193" y="115" width="7" height="37" fill="#1F3864" opacity="0.85"/>
    <rect x="203" y="100" width="7" height="52" fill="#C00000"/>
    <rect x="213" y="112" width="7" height="40" fill="#1F3864" opacity="0.85"/>
    <polyline points="157,142 167,131 177,120 187,110 197,118 207,102 217,114"
              stroke="#C00000" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <text x="148" y="167" font-size="6" fill="#6B7280">Croissance des connaissances</text>
    <text x="148" y="174" font-size="5.5" fill="#9CA3AF">Indice QPC, base 100</text>
  </g>

  <!-- ============ NUAGE DE MOTS — 16 domaines (haut droite) ======= -->
  <g font-family="Segoe UI, Helvetica, sans-serif" transform="translate(300, 60)">
    <text x="0" y="12" font-size="11" font-weight="700" fill="#142346" letter-spacing="0.5">Les 16 domaines couverts</text>
    <line x1="0" y1="18" x2="200" y2="18" stroke="#1F3864" stroke-width="1"/>

    <text x="2" y="44" font-size="17" font-weight="800" fill="#1F3864">Économie agricole</text>
    <text x="32" y="58" font-size="10" font-weight="500" fill="#5A8C3B">&amp; agribusiness</text>

    <text x="190" y="42" font-size="14" font-weight="700" fill="#C00000">Monnaie &amp; finance</text>
    <text x="190" y="62" font-size="14" font-weight="700" fill="#2E7D32">Statistiques</text>
    <text x="290" y="62" font-size="11" font-weight="500" fill="#2E7D32">&amp; économétrie</text>

    <text x="2" y="86" font-size="13" font-weight="700" fill="#B8860B">Microéconomie</text>
    <text x="115" y="86" font-size="13" font-weight="700" fill="#1F3864">Macroéconomie</text>
    <text x="245" y="86" font-size="12" font-weight="600" fill="#C00000">Commerce &amp; Afrique</text>

    <text x="2" y="108" font-size="13" font-weight="700" fill="#142346">BRVM / UEMOA</text>
    <text x="125" y="108" font-size="11" font-weight="600" fill="#6B21A8">Pensée éco.</text>
    <text x="218" y="108" font-size="12" font-weight="700" fill="#6B21A8">Machine learning</text>

    <text x="2" y="128" font-size="11" font-weight="600" fill="#2E7D32">Suivi-évaluation projets</text>
    <text x="160" y="128" font-size="11" font-weight="600" fill="#B8860B">Comptabilité</text>
    <text x="250" y="128" font-size="10" font-weight="600" fill="#C00000">Fiscalité Togo</text>

    <text x="2" y="148" font-size="10" font-weight="600" fill="#142346">Marchés publics Togo</text>
    <text x="140" y="148" font-size="10" font-weight="500" fill="#6B7280">Histoire &amp; éducation</text>

    <text x="2" y="166" font-size="10" font-weight="500" fill="#6B21A8">Sciences sociales</text>
    <text x="115" y="166" font-size="10" font-weight="500" fill="#6B21A8">Deep learning</text>
    <text x="207" y="166" font-size="9" font-weight="500" fill="#6B7280">Culture générale</text>

    <g transform="translate(0, 178)">
      <rect x="0" y="0" width="360" height="22" rx="11" fill="#1F3864"/>
      <text x="180" y="15" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">
        766 questions documentées · réponses sourcées
      </text>
    </g>
  </g>

  <!-- ============ CYCLE ÉCONOMIQUE (bas gauche, 20-380, 270-460) === -->
  <g transform="translate(20, 270)">
    <!-- Cadre/titre -->
    <text x="0" y="14" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#142346" letter-spacing="0.5">Le circuit économique</text>
    <line x1="0" y1="20" x2="340" y2="20" stroke="#1F3864" stroke-width="1"/>

    <!-- Bulle Ménages (gauche) -->
    <g filter="url(#softShadow)">
      <rect x="10" y="50" width="100" height="58" rx="29" fill="url(#cycleHouseGrad)" stroke="#1F3864" stroke-width="1.5"/>
    </g>
    <!-- Icône maison miniature -->
    <g transform="translate(20, 65)">
      <polygon points="0,15 12,4 24,15" fill="#1F3864"/>
      <rect x="3" y="15" width="18" height="13" fill="#1F3864"/>
      <rect x="9" y="20" width="6" height="8" fill="#FFFFFF"/>
    </g>
    <text x="55" y="78" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#1F3864">Ménages</text>
    <text x="55" y="91" font-family="Segoe UI, sans-serif" font-size="8" fill="#1F3864">consomment</text>
    <text x="55" y="101" font-family="Segoe UI, sans-serif" font-size="8" fill="#1F3864">&amp; travaillent</text>

    <!-- Bulle Firmes (droite) -->
    <g filter="url(#softShadow)">
      <rect x="230" y="50" width="100" height="58" rx="29" fill="url(#cycleFirmGrad)" stroke="#C00000" stroke-width="1.5"/>
    </g>
    <!-- Icône usine miniature -->
    <g transform="translate(238, 70)">
      <rect x="0" y="14" width="22" height="14" fill="#C00000"/>
      <polygon points="0,14 6,4 6,14" fill="#C00000"/>
      <polygon points="6,14 13,4 13,14" fill="#C00000"/>
      <polygon points="13,14 20,4 20,14" fill="#C00000"/>
      <rect x="4" y="20" width="4" height="6" fill="#FBEAEA"/>
      <rect x="14" y="20" width="4" height="6" fill="#FBEAEA"/>
    </g>
    <text x="266" y="78" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#C00000">Firmes</text>
    <text x="266" y="91" font-family="Segoe UI, sans-serif" font-size="8" fill="#C00000">produisent</text>
    <text x="266" y="101" font-family="Segoe UI, sans-serif" font-size="8" fill="#C00000">&amp; emploient</text>

    <!-- Flèches haut (M -> F : Travail) -->
    <path d="M 110 60 Q 170 30 230 60" stroke="#1F3864" stroke-width="1.5" fill="none"
          marker-end="url(#arrowBlue)"/>
    <text x="148" y="35" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#1F3864">Travail · capital</text>

    <!-- Flèches haut retour (F -> M : Salaires) -->
    <path d="M 230 75 Q 170 55 110 75" stroke="#1F3864" stroke-width="1.5" fill="none"
          marker-end="url(#arrowBlue)" stroke-dasharray="3 3"/>
    <text x="146" y="69" font-family="Segoe UI, sans-serif" font-size="8" fill="#1F3864">Salaires · revenus</text>

    <!-- Flèches bas (F -> M : Biens & services) -->
    <path d="M 230 96 Q 170 130 110 96" stroke="#C00000" stroke-width="1.5" fill="none"
          marker-end="url(#arrowRed)"/>
    <text x="146" y="127" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#C00000">Biens &amp; services</text>

    <!-- Flèches bas retour (M -> F : Dépenses) -->
    <path d="M 110 89 Q 170 110 230 89" stroke="#C00000" stroke-width="1.5" fill="none"
          marker-end="url(#arrowRed)" stroke-dasharray="3 3"/>
    <text x="148" y="111" font-family="Segoe UI, sans-serif" font-size="8" fill="#C00000">Dépenses</text>

    <!-- Note bas -->
    <text x="0" y="158" font-family="Segoe UI, sans-serif" font-size="8" font-style="italic" fill="#6B7280">
      Circuit simple : flux réels (continus) et flux monétaires (pointillés)
    </text>
  </g>

  <!-- ============ CHAÎNE DE VALEUR AGRICOLE (bas droite, 390-790) == -->
  <g transform="translate(390, 270)">
    <text x="0" y="14" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#142346" letter-spacing="0.5">Chaîne de valeur agricole</text>
    <line x1="0" y1="20" x2="400" y2="20" stroke="#5A8C3B" stroke-width="1"/>

    <!-- Étape 1 : Production (épi de blé + champ) -->
    <g transform="translate(0, 38)">
      <circle cx="40" cy="40" r="32" fill="#E2EFDA" stroke="#5A8C3B" stroke-width="1.5"/>
      <!-- Épi de blé miniature -->
      <g transform="translate(40, 18)">
        <path d="M 0 50 Q 1 30 2 12 Q 3 4 4 0" stroke="#5A8C3B" stroke-width="1.5" fill="none"/>
        <g fill="url(#grainGrad)">
          <ellipse cx="3" cy="3"  rx="2" ry="3.5" transform="rotate(8 3 3)"/>
          <ellipse cx="0" cy="7"  rx="2" ry="3.5" transform="rotate(-10 0 7)"/>
          <ellipse cx="4" cy="11" rx="2" ry="3.5" transform="rotate(12 4 11)"/>
          <ellipse cx="-1" cy="15" rx="2" ry="3.5" transform="rotate(-12 -1 15)"/>
          <ellipse cx="3" cy="19" rx="2" ry="3.5" transform="rotate(14 3 19)"/>
        </g>
        <!-- Feuilles -->
        <path d="M 2 35 Q -10 32 -16 42 Q -8 38 2 38 Z" fill="#5A8C3B"/>
        <path d="M 3 22 Q 16 20 22 30 Q 14 25 3 28 Z" fill="#6FA84B"/>
      </g>
      <text x="40" y="86" font-family="Segoe UI, sans-serif" font-size="9" font-weight="700"
            fill="#5A8C3B" text-anchor="middle">Production</text>
      <text x="40" y="97" font-family="Segoe UI, sans-serif" font-size="7"
            fill="#6B7280" text-anchor="middle">Producteurs · intrants</text>
    </g>

    <!-- Flèche 1 -> 2 -->
    <line x1="80" y1="78" x2="105" y2="78" stroke="#5A8C3B" stroke-width="2" marker-end="url(#arrowGreen)"/>

    <!-- Étape 2 : Transformation (usine simple) -->
    <g transform="translate(110, 38)">
      <circle cx="40" cy="40" r="32" fill="#E2EFDA" stroke="#5A8C3B" stroke-width="1.5"/>
      <!-- Icône usine -->
      <g transform="translate(22, 26)">
        <rect x="0" y="14" width="34" height="18" fill="#B8860B"/>
        <polygon points="0,14 8,4 8,14" fill="#B8860B"/>
        <polygon points="8,14 16,4 16,14" fill="#B8860B"/>
        <polygon points="16,14 24,4 24,14" fill="#B8860B"/>
        <polygon points="24,14 34,4 34,14" fill="#B8860B"/>
        <rect x="6"  y="22" width="6" height="8" fill="#FFFFFF"/>
        <rect x="22" y="22" width="6" height="8" fill="#FFFFFF"/>
        <!-- Petite vapeur -->
        <circle cx="4" cy="-1" r="2.5" fill="#D9E2F3" opacity="0.85"/>
        <circle cx="9" cy="-4" r="2"   fill="#D9E2F3" opacity="0.75"/>
      </g>
      <text x="40" y="86" font-family="Segoe UI, sans-serif" font-size="9" font-weight="700"
            fill="#B8860B" text-anchor="middle">Transformation</text>
      <text x="40" y="97" font-family="Segoe UI, sans-serif" font-size="7"
            fill="#6B7280" text-anchor="middle">Industrie · stockage</text>
    </g>

    <!-- Flèche 2 -> 3 -->
    <line x1="190" y1="78" x2="215" y2="78" stroke="#5A8C3B" stroke-width="2" marker-end="url(#arrowGreen)"/>

    <!-- Étape 3 : Distribution (camion) -->
    <g transform="translate(220, 38)">
      <circle cx="40" cy="40" r="32" fill="#E2EFDA" stroke="#5A8C3B" stroke-width="1.5"/>
      <!-- Icône camion -->
      <g transform="translate(18, 30)">
        <rect x="0" y="6" width="26" height="14" rx="2" fill="#1F3864"/>
        <rect x="26" y="10" width="14" height="10" fill="#1F3864"/>
        <polygon points="40,10 44,15 40,20" fill="#1F3864"/>
        <rect x="28" y="3" width="10" height="7" fill="#D9E2F3"/>
        <circle cx="8"  cy="22" r="3.5" fill="#142346"/>
        <circle cx="20" cy="22" r="3.5" fill="#142346"/>
        <circle cx="33" cy="22" r="3.5" fill="#142346"/>
        <circle cx="8"  cy="22" r="1.5" fill="#FFFFFF"/>
        <circle cx="20" cy="22" r="1.5" fill="#FFFFFF"/>
        <circle cx="33" cy="22" r="1.5" fill="#FFFFFF"/>
      </g>
      <text x="40" y="86" font-family="Segoe UI, sans-serif" font-size="9" font-weight="700"
            fill="#1F3864" text-anchor="middle">Distribution</text>
      <text x="40" y="97" font-family="Segoe UI, sans-serif" font-size="7"
            fill="#6B7280" text-anchor="middle">Transport · marchés</text>
    </g>

    <!-- Flèche 3 -> 4 -->
    <line x1="300" y1="78" x2="325" y2="78" stroke="#5A8C3B" stroke-width="2" marker-end="url(#arrowGreen)"/>

    <!-- Étape 4 : Consommation (panier) -->
    <g transform="translate(330, 38)">
      <circle cx="40" cy="40" r="32" fill="#E2EFDA" stroke="#5A8C3B" stroke-width="1.5"/>
      <!-- Icône panier de courses -->
      <g transform="translate(22, 24)">
        <!-- Anse -->
        <path d="M 7 8 Q 18 -4 29 8" stroke="#1F3864" stroke-width="2" fill="none"/>
        <!-- Corps panier -->
        <polygon points="0,10 36,10 31,28 5,28" fill="#C00000"/>
        <!-- Stries -->
        <line x1="9"  y1="10" x2="11" y2="28" stroke="#FBEAEA" stroke-width="1"/>
        <line x1="18" y1="10" x2="18" y2="28" stroke="#FBEAEA" stroke-width="1"/>
        <line x1="27" y1="10" x2="25" y2="28" stroke="#FBEAEA" stroke-width="1"/>
        <!-- Fruits/légumes au-dessus -->
        <circle cx="11" cy="6"  r="3" fill="#5A8C3B"/>
        <circle cx="18" cy="4"  r="3" fill="#C00000"/>
        <circle cx="25" cy="6"  r="3" fill="#F5C842"/>
      </g>
      <text x="40" y="86" font-family="Segoe UI, sans-serif" font-size="9" font-weight="700"
            fill="#C00000" text-anchor="middle">Consommation</text>
      <text x="40" y="97" font-family="Segoe UI, sans-serif" font-size="7"
            fill="#6B7280" text-anchor="middle">Ménages · export</text>
    </g>

    <!-- Note bas -->
    <text x="0" y="160" font-family="Segoe UI, sans-serif" font-size="8" font-style="italic" fill="#6B7280">
      De la ferme au consommateur : création de valeur à chaque maillon
    </text>
  </g>
</svg>
