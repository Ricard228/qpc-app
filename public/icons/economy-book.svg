<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <defs>
    <linearGradient id="pageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F7FB"/>
    </linearGradient>
    <linearGradient id="coverGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F3864"/>
      <stop offset="100%" stop-color="#142346"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Symboles économiques flottants en arrière-plan -->
  <g opacity="0.18" font-family="Georgia, serif" font-weight="700">
    <text x="50"  y="60"  font-size="36" fill="#1F3864">€</text>
    <text x="410" y="80"  font-size="32" fill="#1F3864">%</text>
    <text x="60"  y="320" font-size="28" fill="#1F3864">$</text>
    <text x="420" y="310" font-size="34" fill="#1F3864">£</text>
    <text x="240" y="40"  font-size="26" fill="#C00000">∑</text>
  </g>

  <!-- Livre ouvert -->
  <g filter="url(#softShadow)">
    <!-- Couverture page gauche (bord visible) -->
    <path d="M 50 110 L 50 290 L 232 280 L 232 105 Z" fill="url(#coverGrad)"/>
    <!-- Couverture page droite (bord visible) -->
    <path d="M 430 110 L 430 290 L 248 280 L 248 105 Z" fill="url(#coverGrad)"/>

    <!-- Page gauche -->
    <path d="M 60 115 L 60 282 L 235 273 Q 240 195 235 105 Z" fill="url(#pageGrad)" stroke="#D1D5DB" stroke-width="0.8"/>
    <!-- Page droite -->
    <path d="M 420 115 L 420 282 L 245 273 Q 240 195 245 105 Z" fill="url(#pageGrad)" stroke="#D1D5DB" stroke-width="0.8"/>

    <!-- Reliure centrale -->
    <path d="M 235 105 Q 240 195 235 273 L 245 273 Q 240 195 245 105 Z" fill="#142346"/>
  </g>

  <!-- Contenu page gauche : titre + texte -->
  <g font-family="Georgia, serif">
    <text x="80" y="138" font-size="13" font-weight="700" fill="#1F3864">L'ÉCONOMIE</text>
    <text x="80" y="153" font-size="9" fill="#6B7280">par les questions</text>
    <line x1="80" y1="160" x2="220" y2="158" stroke="#9CA3AF" stroke-width="0.8"/>

    <!-- Lignes de texte -->
    <line x1="80"  y1="178" x2="225" y2="176" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="80"  y1="192" x2="220" y2="190" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="80"  y1="206" x2="225" y2="204" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="80"  y1="220" x2="215" y2="218" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="80"  y1="234" x2="223" y2="231" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="80"  y1="248" x2="210" y2="246" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="80"  y1="262" x2="220" y2="260" stroke="#9CA3AF" stroke-width="1"/>
  </g>

  <!-- Contenu page droite : petit graphique financier ascendant -->
  <g>
    <!-- Cadre du graphique -->
    <rect x="260" y="135" width="150" height="100" fill="#FAFBFD" stroke="#E5E7EB" stroke-width="0.8"/>
    <!-- Lignes horizontales (grille) -->
    <line x1="260" y1="160" x2="410" y2="160" stroke="#E5E7EB" stroke-width="0.5"/>
    <line x1="260" y1="185" x2="410" y2="185" stroke="#E5E7EB" stroke-width="0.5"/>
    <line x1="260" y1="210" x2="410" y2="210" stroke="#E5E7EB" stroke-width="0.5"/>
    <!-- Barres -->
    <rect x="270" y="200" width="14" height="32" fill="#1F3864" opacity="0.6"/>
    <rect x="290" y="185" width="14" height="47" fill="#1F3864" opacity="0.7"/>
    <rect x="310" y="170" width="14" height="62" fill="#1F3864" opacity="0.8"/>
    <rect x="330" y="155" width="14" height="77" fill="#1F3864"/>
    <rect x="350" y="170" width="14" height="62" fill="#1F3864" opacity="0.8"/>
    <rect x="370" y="145" width="14" height="87" fill="#C00000"/>
    <rect x="390" y="160" width="14" height="72" fill="#1F3864" opacity="0.85"/>

    <!-- Courbe tendancielle ascendante -->
    <polyline points="277,205 297,190 317,175 337,160 357,170 377,150 397,162"
              stroke="#C00000" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Points sur la courbe -->
    <circle cx="277" cy="205" r="2.2" fill="#C00000"/>
    <circle cx="297" cy="190" r="2.2" fill="#C00000"/>
    <circle cx="317" cy="175" r="2.2" fill="#C00000"/>
    <circle cx="337" cy="160" r="2.2" fill="#C00000"/>
    <circle cx="357" cy="170" r="2.2" fill="#C00000"/>
    <circle cx="377" cy="150" r="2.2" fill="#C00000"/>
    <circle cx="397" cy="162" r="2.2" fill="#C00000"/>

    <!-- Légende sous le graphique -->
    <text x="260" y="252" font-family="Georgia, serif" font-size="9" fill="#6B7280">Croissance des connaissances</text>
    <text x="260" y="265" font-family="Georgia, serif" font-size="8" fill="#9CA3AF">Indice QPC, base 100</text>
  </g>

  <!-- Chapeau de diplômé décoratif en haut -->
  <g transform="translate(220, 30)">
    <polygon points="0,15 30,5 60,15 30,25" fill="#1F3864"/>
    <rect x="22" y="20" width="16" height="10" fill="#1F3864"/>
    <line x1="45" y1="10" x2="50" y2="32" stroke="#C00000" stroke-width="1.5"/>
    <circle cx="51" cy="34" r="2.5" fill="#C00000"/>
  </g>
</svg>
